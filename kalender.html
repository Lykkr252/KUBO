<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <title>Kontakt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1><a href="kubo.html">KUBO</a></h1>

        <nav>
            <a href="kubo.html">Forside</a>
            <a href="moduler.html">Læringsmoduler</a>
            <a href="spil.html">Spil</a>
            <a href="kalender.html">Visuel Kalender</a>
            <a href="tidsstyring.html">Tidsstyring</a>
            <a href="kontaktside.html">Kontakt</a>
        </nav>

    <head>
        <meta charset="UTF-8">
        <title>KUBO - Visuel Kalender</title>

        <style>
            body {
                font-family: sans-serif;
                background: #f4f5f8;
                margin: 0
            }

            header {
                text-align: center;
                padding: 20px
            }

            main {
                max-width: 900px;
                margin: auto;
                padding: 20px
            }

            .month-container {
                background: white;
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            }

            .month-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
            }

            .month-header button {
                background: linear-gradient(135deg, #6a5acd, #7b68ee);
                color: white;
                border: none;
                padding: 12px 20px;
                border-radius: 10px;
                cursor: pointer;
                font-weight: bold;
            }

            .month-title {
                text-align: center;
            }

            .month-title h2 {
                margin: 0;
                font-size: 28px;
            }

            .month-title p {
                margin: 0;
                color: #666;
            }

            .weekdays {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                text-align: center;
                font-weight: bold;
                margin-bottom: 15px;
            }

            .calendar-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: 12px;
            }

            .day {
                padding: 18px;
                border-radius: 14px;
                text-align: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                transition: 0.2s;
                background: white;
            }

            .day:hover {
                transform: scale(1.05);
            }

            .settings-btn {
                padding: 10px 18px;
                background: linear-gradient(135deg, #6a5acd, #7b68ee);
                color: white;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                margin-bottom: 20px;
            }

            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                justify-content: center;
                align-items: center;
            }

            .modal-content {
                background: white;
                padding: 30px;
                border-radius: 15px;
                width: 320px;
            }

            .modal-content label {
                display: block;
                margin: 12px 0;
            }

            .modal-buttons {
                display: flex;
                justify-content: space-between;
                margin-top: 20px;
            }
        </style>
    </head>

    <body>

        <header>
            <h1>📅 Visuel Kalender</h1>
            <p>Vælg dit læringsniveau og justér dagene direkte i kalenderen!</p>
        </header>

        <main>

            <button id="openSettings" class="settings-btn">⚙ Kalender Indstillinger</button>

            <div class="month-container">

                <div class="month-header">
                    <button id="prevBtn">◀ Forrige</button>

                    <div class="month-title">
                        <h2 id="monthName"></h2>
                        <p id="year"></p>
                    </div>

                    <button id="nextBtn">Næste ▶</button>
                </div>

                <div class="weekdays">
                    <div>Man</div>
                    <div>Tir</div>
                    <div>Ons</div>
                    <div>Tor</div>
                    <div>Fre</div>
                    <div>Lør</div>
                    <div>Søn</div>
                </div>

                <div id="calendarGrid" class="calendar-grid"></div>

            </div>
        </main>

        <!-- SETTINGS MODAL -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>Calendar Settings</h2>

                <label><input type="radio" name="niveau" value="begynder" checked>
                    Beginner (symboler + farver + tal)</label>

                <label><input type="radio" name="niveau" value="øvet">
                    Intermediate (symboler + tal)</label>

                <label><input type="radio" name="niveau" value="avanceret">
                    Advanced (kun tal)</label>

                <div class="modal-buttons">
                    <button id="cancelBtn">Cancel</button>
                    <button id="saveBtn">Save</button>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {

                let currentDate = new Date();
                let niveau = "begynder";

                const grid = document.getElementById("calendarGrid");
                const modal = document.getElementById("settingsModal");

                const symboler = ["🌞", "📚", "🎯", "💡", "🔔", "🔢", "🧩"];
                const farver = ["#FFB6C1", "#87CEFA", "#FFD700", "#90EE90", "#FFA07A", "#DDA0DD", "#ADD8E6"];

                document.getElementById("prevBtn").addEventListener("click", () => {
                    currentDate.setMonth(currentDate.getMonth() - 1);
                    render();
                });

                document.getElementById("nextBtn").addEventListener("click", () => {
                    currentDate.setMonth(currentDate.getMonth() + 1);
                    render();
                });

                document.getElementById("openSettings").onclick = () => modal.style.display = "flex";
                document.getElementById("cancelBtn").onclick = () => modal.style.display = "none";

                document.getElementById("saveBtn").onclick = () => {
                    niveau = document.querySelector('input[name="niveau"]:checked').value;
                    modal.style.display = "none";
                    render();
                };

                function render() {

                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth();

                    const monthNames = [
                        "Januar", "Februar", "Marts", "April", "Maj", "Juni",
                        "Juli", "August", "September", "Oktober", "November", "December"
                    ];

                    document.getElementById("monthName").textContent = monthNames[month];
                    document.getElementById("year").textContent = year;

                    grid.innerHTML = "";

                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    const offset = (firstDay + 6) % 7;

                    for (let i = 0; i < offset; i++) {
                        grid.appendChild(document.createElement("div"));
                    }

                    for (let day = 1; day <= daysInMonth; day++) {

                        const el = document.createElement("div");
                        el.className = "day";
                        el.contentEditable = true;

                        let showSymbols = niveau !== "avanceret";
                        let showColors = niveau === "begynder";

                        if (showColors) {
                            el.style.backgroundColor = farver[day % farver.length];
                        }

                        const symbol = showSymbols ? symboler[day % symboler.length] + "<br>" : "";
                        const number = "<strong>" + day + "</strong>";

                        el.innerHTML = symbol + number;

                        grid.appendChild(el);
                    }
                }

                render();
            });
        </script>

    </body>

</html>
