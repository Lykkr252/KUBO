<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <title>KUBO - Log ind</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="/" class="navbar-logo">KU<span>BO</span></a>
            <p class="auth-subtitle" data-i18n="login.subtitle">Log ind for at gemme din kalender</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')" data-i18n="login.tab.in">Log ind</button>
                <button class="auth-tab" id="tabRegister" onclick="switchTab('register')" data-i18n="login.tab.reg">Opret konto</button>
            </div>

            <div id="loginForm">
                <div class="form-group">
                    <label data-i18n="login.user.lbl">Brugernavn</label>
                    <input type="text" id="loginUser" data-i18n-ph="login.user.ph" placeholder="Dit brugernavn">
                </div>
                <div class="form-group">
                    <label data-i18n="login.pass.lbl">Adgangskode</label>
                    <input type="password" id="loginPass" data-i18n-ph="login.pass.ph" placeholder="Din adgangskode">
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="handleLogin()" data-i18n="login.btn">Log ind</button>
            </div>

            <div id="registerForm" style="display:none">
                <div class="form-group">
                    <label data-i18n="reg.user.lbl">Brugernavn</label>
                    <input type="text" id="regUser" data-i18n-ph="reg.user.ph" placeholder="Vælg et brugernavn">
                </div>
                <div class="form-group">
                    <label data-i18n="reg.pass.lbl">Adgangskode</label>
                    <input type="password" id="regPass" data-i18n-ph="reg.pass.ph" placeholder="Vælg en adgangskode">
                </div>
                <div class="form-group">
                    <label data-i18n="reg.pass2.lbl">Bekræft adgangskode</label>
                    <input type="password" id="regPass2" data-i18n-ph="reg.pass2.ph" placeholder="Gentag adgangskode">
                </div>

                <hr style="border:none;border-top:1px solid #e2e8f0;margin:0.75rem 0">
                <p style="font-size:0.8rem;color:#94a3b8;margin-bottom:0.5rem">Valgfrie oplysninger (kan udfyldes senere)</p>

                <div class="form-group">
                    <label>Studienummer</label>
                    <input type="text" id="regStudynumber" placeholder="fx 12345">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="regEmail" placeholder="din@email.dk">
                </div>
                <div class="form-group">
                    <label>Studieretning</label>
                    <input type="text" id="regStudyline" placeholder="fx HF, HTX, STX">
                </div>
                <div class="form-group">
                    <label>Fag</label>
                    <input type="text" id="regSubject" placeholder="fx Matematik">
                </div>
                <div class="form-group">
                    <label>Klasse</label>
                    <input type="text" id="regClass" placeholder="fx 2A">
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="handleRegister()" data-i18n="reg.btn">Opret konto</button>
            </div>

            <p id="authMsg" style="color:red;margin-top:1rem;display:none"></p>
        </div>
    </div>

    <script src="/static/js/auth.js" defer></script>
    <script>
        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        }

        async function handleLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value;
            if (!u || !p) return showMsg('Udfyld alle felter.');
            const ok = await doLogin(u, p);
            if (ok) window.location.href = "index.html";
            else showMsg('Forkert brugernavn eller adgangskode.');
        }

        async function handleRegister() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value;
            const p2 = document.getElementById('regPass2').value;
            if (!u || !p || !p2) return showMsg('Udfyld alle felter.');
            if (p !== p2) return showMsg('Adgangskoderne matcher ikke.');
            if (u.length < 3) return showMsg('Brugernavn skal være mindst 3 tegn.');
            if (p.length < 4) return showMsg('Adgangskode skal være mindst 4 tegn.');

            const profile = {
                studynumber: document.getElementById('regStudynumber').value.trim(),
                email:       document.getElementById('regEmail').value.trim(),
                studyline:   document.getElementById('regStudyline').value.trim(),
                subject:     document.getElementById('regSubject').value.trim(),
                class:       document.getElementById('regClass').value.trim(),
                preferredLanguage: sessionStorage.getItem('kubo_lang') || 'da',
            };
            const result = await doRegister(u, p, profile);
            if (result === 'taken') return showMsg('Brugernavnet er allerede taget.');
            if (result !== 'ok') return showMsg(result);
            showMsg('Konto oprettet! Logger ind...', 'green');
            await doLogin(u, p);
            setTimeout(() => window.location.href = "index.html", 800);
        }

        function showMsg(txt, color = 'red') {
            const el = document.getElementById('authMsg');
            el.textContent = txt; el.style.color = color; el.style.display = 'block';
        }
    </script>
</body>

</html>
